github:
  # Token is only needed for repos without local_path (GitHub API fallback).
  # Use $(gh auth token) to pull from GitHub CLI, or set GITHUB_PAT env var.
  token: "${GITHUB_PAT}"
  # For GitHub Enterprise or GitLab, change the host for commit URLs:
  # host: "https://gitlab.company.com"
  host: "https://github.com"
  repos:
    - owner: your-org
      name: repo-one
      # Your role gives the generator context about your perspective.
      # This shapes the "author voice" in drafts — write what you'd put on LinkedIn.
      role: "Lead architect — designed event-driven pipeline"
      content_weight: 1.0  # 0.0-1.0, higher = more likely to be selected
      local_path: "/path/to/local/clone"  # optional — if set, uses git log (faster, no API)
    - owner: your-org
      name: repo-two
      role: "Contributor — ML feature engineering"
      content_weight: 0.8
      # No local_path → falls back to GitHub API (requires token)

llm:
  # --- Ollama (default, free, local) ---
  provider: ollama
  base_url: "http://localhost:11434/v1"
  classifier_model: qwen3:8b
  generator_model: qwen3:8b
  api_key: "ollama"

  # --- Anthropic (uncomment to use cloud models) ---
  # provider: anthropic
  # classifier_model: claude-haiku-4-5-20251001
  # generator_model: claude-sonnet-4-5-20250514
  # api_key: "${ANTHROPIC_API_KEY}"

sanitisation:
  blocklist:
    company_names: ["Acme Corp", "AcmeCo"]
    client_names: ["ClientX", "Big Bank"]
    product_names: ["Project Phoenix", "internal-tool"]
    infrastructure: ["prod-db-01.internal", "10.0."]
    people: ["John Doe"]
  abstractions:
    "Acme Corp": "a mid-size fintech"
    "Project Phoenix": "an internal data platform"
    "Big Bank": "a major financial institution"

content:
  # Define 3-5 content pillars that match YOUR expertise.
  # The classifier maps activities to these pillars and scores them.
  # Below are examples for different roles — pick what fits you.

  # --- Example: AI / Data Engineer ---
  pillars:
    - name: ai_engineering
      description: "Building AI agents, LLM integration, prompt engineering"
      repo_signals: ["agent", "llm", "anthropic", "openai", "prompt"]
      weight: 1.0
    - name: data_architecture
      description: "Data pipelines, ETL, database design, event-driven systems"
      repo_signals: ["pipeline", "etl", "kafka", "database", "migration"]
      weight: 0.8
    - name: engineering_leadership
      description: "Technical decisions, team practices, code review culture"
      repo_signals: ["refactor", "architecture", "review", "ci", "deploy"]
      weight: 0.6
    - name: open_source
      description: "Open source contributions, community, tooling"
      repo_signals: ["oss", "contribution", "community", "plugin"]
      weight: 0.5

