  style:
    tone: "pragmatic, technically credible, mildly opinionated"
    language: "en"
    max_length: 1500
    use_emoji: false
    use_hashtags: true
    hashtag_count: 3
    # Paste 2-3 LinkedIn posts you like (yours or others') as style examples.
    # The generator will match this tone and structure.
    few_shot_posts:
      - |
        Most AI agent frameworks are solving the wrong problem.

        They give you 47 tools, 12 memory backends, and a flow chart
        that looks like a London tube map. Then your agent hallucinates
        on step 3 anyway.

        What actually works: constrained loops, explicit state, and
        knowing when to stop.

        We rebuilt our pipeline agent with 3 tools and a token budget.
        Result: 94% task completion, zero runaway loops.

        The boring architecture won.
      - |
        Unpopular opinion: your data pipeline doesn't need Kafka.

        Last month we replaced a Kafka cluster with a simple
        PostgreSQL-based queue. 400 events/second, zero ops overhead,
        and the on-call engineer can actually debug it at 3am.

        Not every problem needs distributed infrastructure.
        Sometimes the right answer is the simplest one that works.
